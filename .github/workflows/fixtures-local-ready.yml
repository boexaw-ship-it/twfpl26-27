name: 1-Time FPL Local Ready Matrix Sync

on:
  workflow_dispatch: # 💡 GitHub Actions ထဲမှ Manual 'Run workflow' ခလုတ်ဖြင့်သာ မောင်းရန်

jobs:
  local-matrix-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Codes
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Network Request Tool
        run: |
          npm init -y
          npm install firebase-admin axios

      - name: Execute Local Ready Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        # 💡 scripts/ folder ထဲက အန်ကယ့် ၂၀၂၆-၂၇ အသင်း ID စစ်စစ်ဖိုင်ကို တိုက်ရိုက်မောင်းနှင်ပါမည်
        run: node scripts/fixtures-local-ready.js

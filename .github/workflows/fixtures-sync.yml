name: FPL Fixtures Master Sync

on:
  workflow_dispatch: # GitHub Actions ထဲမှ Manual 'Run workflow' ခလုတ်ဖြင့်သာ မောင်းရန်

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Codes
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Network Request Tool
        run: |
          npm init -y
          npm install firebase-admin axios

      - name: Execute Fixtures Sync Script
        env:
          # GitHub Repository Secrets ထဲက Firebase Admin Key အား လှမ်းချိတ်ခြင်း
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        # 💡 ✅ FIXED PATH: fixtures-sync.js သည် scripts/ folder ထဲတွင် ရှိနေသောကြောင့် လမ်းကြောင်းအား အမှန်ပြင်ပေးလိုက်ပါသည်
        run: node scripts/fixtures-sync.js


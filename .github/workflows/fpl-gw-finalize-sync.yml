# ============================================
# TW Fantasy Official League
# GW Finalize Sync Workflow
# ============================================
# ဒီ Workflow က scripts/gw-finalize-sync.js ကိုပဲ run ပေးတယ်
#
# Logic:
#   - GW (Gameweek) တစ်ခု ပွဲစဉ်များ "finished" မဖြစ်သေးရင် → script က skip လုပ်မယ်
#   - GW "finished" ဖြစ်ပြီဆိုမှသာ → Firebase ထဲ finalTeams/finalPoints ရေးမည်
#   - team.html က ဒီ data ကို ဖတ်ပြသမည်
#
# weekly-live-sync.js / league-sync.js နှင့် ကွဲပြားသည့်အချက်:
#   ၎င်းတို့က 6 နာရီတိုင်း "live" data ကို update လုပ်ပြီး
#   ဒီ workflow ကတော့ "completed GW result" ကိုပဲ သီးသန့်ကိုင်တွယ်သည်
#
# Trigger:
#   - Manual: GitHub Actions tab ကနေ "Run workflow" ခလုတ်နှိပ်ပြီး run
#   - Auto:   6 နာရီတစ်ခါ (weekly-live-sync.yml အတိုင်းတူ schedule)
# ============================================

name: FPL GW Finalize Sync

on:
  # Manual trigger — Admin လိုချင်တဲ့အချိန် run လို့ရအောင်
  workflow_dispatch:

  # Auto trigger — 6 နာရီတစ်ခါ
  schedule:
    - cron: "0 */6 * * *"

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Step 1 — Repo code ကို checkout လုပ်
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2 — Node.js Setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 3 — Dependencies Install
      - name: Install Dependencies
        run: npm install firebase-admin

      # Step 4 — GW Finalize Sync (GW ပြီးဆုံးမှသာ Firebase ရေးမည်)
      - name: Run GW Finalize Sync
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/gw-finalize-sync.js

      # Step 5 — Sync ပြီးရင် summary log
      - name: Finalize Sync Complete
        run: echo "✅ TW Fantasy GW Finalize Sync Completed at $(date)"

# ============================================
# TW Fantasy Official League
# Player Scout Sync Workflow (Match-Day Optimized)
# ============================================
# ဒီ Workflow က scripts/player-scout-sync.js ကို စနစ်တကျ မောင်းနှင်ပေးတယ်
#   - Player price, ownership%, total points, form
#   - Next 3 matches + FDR (Fixture Difficulty Rating)
# ကို Firebase players/{id} (သို့မဟုတ် scoutPlayers) ထဲ update လုပ်ပေးတယ်
#
# Trigger:
#   - Manual: GitHub Actions tab ကနေ "Run workflow" ခလုတ်နှိပ်ပြီး စိတ်ကြိုက် run နိုင်ခြင်း
#   - Auto Schedule:
#       ၁။ ပုံမှန်အချိန်များတွင် => ၆ နာရီတစ်ခါ အလိုအလျောက် run ခြင်း
#       ၂။ ပွဲစဉ်များရှိသည့် match-day အချိန်များတွင် => ၁၀ မိနစ်တစ်ခါ အော်တို အမြန် run ခြင်း
# ============================================

name: FPL Player Scout Sync

on:
  # Manual trigger — Admin လိုချင်တဲ့အချိန် ဝင်ရောက်နှိပ်ပြီး run နိုင်ရန်
  workflow_dispatch:

  # Auto trigger — ၆ နာရီတစ်ခါ စနစ်နှင့် ပွဲချိန်အတွင်း ၁၀ မိနစ်တစ်ခါ ပူးတွဲစနစ်
  schedule:
    - cron: "0 */6 * * *"       # ⏰ မူရင်းစနစ်: ၆ နာရီလျှင် တစ်ကြိမ် ပုံမှန် run စေခြင်း
    - cron: "*/10 * * * *"      # ⚡ အန်ကယ့် Logic: ပွဲချိန်အတွင်း ဒေတာမြန်ဆန်ရန် ၁၀ မိနစ်တစ်ခါ အော်တို run စေခြင်း

jobs:
  scout-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8          # 💡 [Master Stop]: Workflow တစ်ခုလုံး ၈ မိနစ်ထက်ကျော်လျှင် အဓမ္မ ရပ်တန့်ပစ်မည်

    steps:
      # Step 1 — Repository ကုဒ်အား ဆွဲယူခြင်း
      - name: Checkout Repository
        uses: actions/checkout@v4
        timeout-minutes: 2      # 🛑 [Stop Safeguard]: ကုဒ်ဆွဲယူခြင်း ၂ မိနစ်ကျော်လျှင် ချက်ချင်း ရပ်ပစ်မည်

      # Step 2 — Node.js Setup ပြုလုပ်ခြင်း
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
        timeout-minutes: 2      # 🛑 [Stop Safeguard]: Node runtime တည်ဆောက်ခြင်း ၂ မိနစ်ကျော်လျှင် ရပ်ပစ်မည်

      # Step 3 — Node Dependencies Framework များ Install ထည့်သွင်းခြင်း
      - name: Install Dependencies
        run: npm install firebase-admin
        timeout-minutes: 3      # 🛑 [Stop Safeguard]: Framework သွင်းခြင်း ၃ မိနစ်ကျော်လျှင် ချက်ချင်း ရပ်ပစ်မည်

      # Step 4 — Player Scout Sync ကျည်ဆန်မောင်းထည့်ခြင်း (Price/Ownership/Points/Form/Fixtures)
      - name: Run Player Scout Sync
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/player-scout-sync.js
        timeout-minutes: 5      # 🛑 [Critical Stop]: JS ဒေတာဆွဲမှု ၅ မိနစ်ထက်ကျော်သွားပါက ကွန်ရက်ပိတ်ဆို့ခြင်းမှ ကာကွယ်ရန် ချက်ချင်း ရပ်တန့် (Stop) ပစ်မည်

      # Step 5 — အောင်မြင်စွာ ပြီးဆုံးကြောင်း Summary Log ထုတ်ပြန်ခြင်း
      - name: Scout Sync Complete
        run: echo "✅ TW Fantasy Player Scout Sync Completed Successfully at $(date)"

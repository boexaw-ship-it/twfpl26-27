# ============================================
# TW Fantasy Official League
# Player Scout Sync Workflow (Match-Day Optimized)
# ============================================

name: FPL Player Scout Sync

on:
  # 💡 1. MANUAL TRIGGER — အန်ကယ် လိုချင်တဲ့အချိန် ဝင်ရောက်နှိပ်ပြီး run နိုင်ရန် Manual ခလုတ်
  workflow_dispatch:

  # 💡 2. AUTO MATCH-DAY TIMELINE (CRON) — စနေ၊ တနင်္ဂနွေ ပွဲကန်ချိန်အတွင်းသာ ၁ နာရီတစ်ခါ အော်တိုမောင်းရန်
  schedule:
    # 🎯 စနေနေ့ (Saturday) မြန်မာစံတော်ချိန် ညနေ 19:00, 20:00, 21:00, 22:00, 23:00, 24:00 တိတိတွင် မောင်းမည်
    # (UTC အနေဖြင့် 12:30, 13:30, 14:30, 15:30, 16:30, 17:30 တွင် အလုပ်လုပ်ပါမည်)
    - cron: '30 12,13,14,15,16,17 * * 6'

    # 🎯 တနင်္ဂနွေနေ့ (Sunday) မြန်မာစံတော်ချိန် ညနေ 19:00, 20:00, 21:00, 22:00, 23:00, 24:00 တိတိတွင် မောင်းမည်
    # (UTC အနေဖြင့် 12:30, 13:30, 14:30, 15:30, 16:30, 17:30 တွင် အလုပ်လုပ်ပါမည်)
    - cron: '30 12,13,14,15,16,17 * * 0'

jobs:
  scout-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8          # [Master Stop]: Workflow တစ်ခုလုံး ၈ မိနစ်ထက်ကျော်လျှင် အဓမ္မ ရပ်တန့်ပစ်မည်

    steps:
      # Step 1 — Repository ကုဒ်အား ဆွဲယူခြင်း
      - name: Checkout Repository
        uses: actions/checkout@v4
        timeout-minutes: 2      # [Stop Safeguard]: ကုဒ်ဆွဲယူခြင်း ၂ မိနစ်ကျော်လျှင် ချက်ချင်း ရပ်ပစ်မည်

      # Step 2 — Node.js Setup ပြုလုပ်ခြင်း
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
        timeout-minutes: 2      # [Stop Safeguard]: Node runtime တည်ဆောက်ခြင်း ၂ မိနစ်ကျော်လျှင် ရပ်ပစ်မည်

      # Step 3 — Node Dependencies Framework များ Install ထည့်သွင်းခြင်း
      - name: Install Dependencies
        run: |
          npm init -y
          npm install firebase-admin axios
        timeout-minutes: 3      # [Stop Safeguard]: Framework သွင်းခြင်း ၃ မိနစ်ကျော်လျှင် ချက်ချင်း ရပ်ပစ်မည်

      # Step 4 — Player Scout Sync ကျည်ဆန်မောင်းထည့်ခြင်း (Price/Ownership/Points/Form/Fixtures)
      - name: Run Player Scout Sync
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        # 💡 scripts/player-scout-sync.js ဖိုင်ကို တိုက်ရိုက်လမ်းညွှန်၍ အော်တို Update ဆွဲခြင်း
        run: node scripts/player-scout-sync.js
        timeout-minutes: 5      # [Critical Stop]: JS ဒေတာဆွဲမှု ၅ မိနစ်ထက်ကျော်သွားပါက ချက်ချင်း ရပ်တန့်ပစ်မည်

      # Step 5 — အောင်မြင်စွာ ပြီးဆုံးကြောင်း Summary Log ထုတ်ပြန်ခြင်း
      - name: Scout Sync Complete
        run: echo "✅ TW Fantasy Player Scout Sync Completed Successfully at $(date)"
        

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#F4F7F2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>TW Fantasy League</title>
  <link rel="manifest" href="./public/manifest.json" />
  <link rel="apple-touch-icon" href="./public/icons/icon-192x192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./css/index.css" />
  <script type="module" src="./js/index.js"></script>
</head>

<body class="flex items-center justify-center min-h-screen px-6">
  <div class="bg-scene">
    <div class="blob" style="width:280px;height:280px;top:-90px;left:-90px;background:radial-gradient(circle,rgba(27,77,46,0.22) 0%,transparent 70%);"></div>
    <div class="blob" style="width:260px;height:260px;bottom:-100px;right:-90px;background:radial-gradient(circle,rgba(201,168,76,0.22) 0%,transparent 70%);"></div>
    <div class="blob" style="width:200px;height:200px;top:35%;right:-70px;background:radial-gradient(circle,rgba(47,122,79,0.16) 0%,transparent 70%);"></div>
  </div>

  <div class="fade-in w-full max-w-sm relative" style="z-index:10;">
    <div class="flex flex-col items-center mb-8">
      <div class="w-24 h-24 rounded-full flex items-center justify-center glass-card float-slow mb-4" style="border-color: rgba(27,77,46,0.25);">
        <img src="./public/icons/icon-192x192.png"
             onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block';"
             class="w-16 h-16 rounded-full object-cover" alt="TW FPL Logo" />
        <div id="logo-text" style="display:none; font-family:'Bebas Neue'; font-size:2.2rem; color:var(--tw-green-800);">TW</div>
      </div>
      <h1 class="green-text text-3xl font-bold" style="font-family:'Bebas Neue'; letter-spacing:0.12em;">TW FANTASY</h1>
      <p class="gold-text text-xs font-semibold tracking-[0.25em] uppercase mt-1">Official Fantasy League</p>
    </div>

    <div class="glass-card rounded-3xl p-6" style="position: relative;">
      <h2 class="text-lg font-bold mb-5 text-center" style="color:var(--tw-green-900);">Login ဝင်ရောက်ရန်</h2>

      <div class="mb-4">
        <label class="text-xs font-semibold uppercase tracking-widest mb-1.5 block" style="color:var(--tw-green-600);">Email</label>
        <input id="email" type="email" placeholder="your@email.com" autocomplete="email" class="tw-input w-full rounded-xl px-4 py-3 text-sm" />
      </div>
      <div class="mb-5">
        <label class="text-xs font-semibold uppercase tracking-widest mb-1.5 block" style="color:var(--tw-green-600);">Password</label>
        <div class="relative">
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" class="tw-input w-full rounded-xl px-4 py-3 text-sm pr-12" />
          <button onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-lg" style="color:var(--tw-green-600);">👁</button>
        </div>
      </div>
      <div id="error-msg" class="hidden bg-red-50 border border-red-300 text-red-600 text-xs rounded-lg px-3 py-2 mb-4"></div>

      <button id="login-btn" onclick="window.handleLogin()" class="btn-primary w-full rounded-xl py-3.5 text-sm mb-4">Login</button>

      <div class="flex items-center gap-3 mb-4">
        <div class="flex-1 border-t" style="border-color:rgba(27,77,46,0.15);"></div>
        <span class="text-xs font-medium" style="color:var(--tw-text-dim);">မရှိသေးဘူးလား?</span>
        <div class="flex-1 border-t" style="border-color:rgba(27,77,46,0.15);"></div>
      </div>

      <a href="./pages/register.html" class="btn-ghost block text-center rounded-xl py-3.5 text-sm">
        Register လုပ်ရန်
      </a>
    </div>
    <p class="text-center text-xs mt-6 font-medium" style="color:var(--tw-text-dim);">TW Fantasy Official League © 2026-27</p>
  </div>

</body>
</html>

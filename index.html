<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D2B1A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>TW Fantasy League</title>
  <link rel="manifest" href="/twfpl26-27/public/manifest.json" />
  <link class="apple-touch-icon" href="/twfpl26-27/public/icons/icon-192x192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <script type="module">
    import { auth, db } from "/twfpl26-27/js/firebase-config.js";
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Login ဝင်ပြီးသားဆိုရင် status မစစ်ဘဲ dashboard တန်းပို့
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        window.location.href = "/twfpl26-27/pages/dashboard.html";
      }
    });

    window.handleLogin = async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorEl = document.getElementById("error-msg");
      const btnEl = document.getElementById("register-btn");

      if (!teamName || !fplId || !email || !password) {
        errorEl.textContent = "အချက်အလက်အားလုံး ဖြည့်ပါ။";
        errorEl.classList.remove("hidden"); return;
      }
      if (password.length < 6) {
        errorEl.textContent = "Password အနည်းဆုံး ၆ လုံး ထည့်ပါ။";
        errorEl.classList.remove("hidden"); return;
      }

      btnEl.disabled = true;
      btnEl.innerHTML = "⏳ Logging in...";
      errorEl.classList.add("hidden");

      try {
        const uc = await createUserWithEmailAndPassword(auth, email, password);
        window.location.href = "/twfpl26-27/pages/dashboard.html";
      } catch (err) {
        let msg = "Login မအောင်မြင်ပါ။";
        errorEl.textContent = msg;
        errorEl.classList.remove("hidden");
        btnEl.disabled = false;
        btnEl.innerHTML = "Login ဝင်ရန်";
      }
    };
  </script>
  <style>
    /* 💡 🎯 🚀 ABSOLUTE PAGE-WIDE ANTI-GOOGLE SELECTION BLOCK */
    /* စာမျက်နှာတစ်ခုလုံးရှိ မည်သည့်စာသား၊ ခလုတ်ကိုမဆို ဖိမိပါက Google Translate / Search ကြီး လုံးဝမပေါ်စေရန် ကာကွယ်ခြင်း */
    body { 
      font-family: "Inter", sans-serif; 
      background: #0D2B1A; 
      height: 100vh; 
      overflow: hidden; 
      display: flex; 
      flex-direction: column; 
      -webkit-user-select: none;  
      -moz-user-select: none;     
      -ms-user-select: none;      
      user-select: none;          
    }
    
    .gold-text { background: linear-gradient(135deg, #C9A84C, #F0D060, #A07830); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 12px; color:#3A9E5F; cursor:pointer; transition:all 0.2s; }
    .nav-item.active, .nav-item:active { color:#C9A84C; }
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    
    .btn-gold { background: linear-gradient(135deg, #C9A84C, #F0D060); color: #0D2B1A; font-weight: 700; transition: all 0.2s; }
    .btn-gold:active { transform: scale(0.97); }
    .btn-gold:disabled { opacity: 0.7; }
    .tw-input { background: rgba(13,43,26,0.8); border: 1px solid #2A7A47; color: white; transition: border-color 0.2s; }
    .tw-input:focus { outline: none; border-color: #C9A84C; box-shadow: 0 0 0 2px rgba(201,168,76,0.2); }
    .tw-input::placeholder { color: #3A9E5F; }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen px-6">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-[-100px] left-[-100px] w-80 h-80 rounded-full" style="background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%)"></div>
    <div class="absolute bottom-[-100px] right-[-100px] w-80 h-80 rounded-full" style="background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%)"></div>
  </div>

  <div class="fade-in w-full max-w-sm">
    <div class="flex flex-col items-center mb-8">
      <div class="w-28 h-28 rounded-full flex items-center justify-center glow-gold mb-4"
           style="background: linear-gradient(145deg, #1F5C36, #0D2B1A); border: 2px solid #C9A84C;">
        <img src="/twfpl26-27/public/icons/icon-192x192.png"
             onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block';"
             class="w-20 h-20 rounded-full object-cover" alt="TW FPL Logo" />
        <div id="logo-text" style="display:none; font-family:'Bebas Neue'; font-size:2.5rem; background: linear-gradient(135deg, #C9A84C, #F0D060); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">TW</div>
      </div>
      <h1 class="gold-text text-3xl font-bold" style="font-family:'Bebas Neue'; letter-spacing:0.1em;">TW FANTASY</h1>
      <p class="text-green-400 text-xs tracking-widest uppercase mt-1">Official Fantasy League</p>
    </div>

    <div class="rounded-2xl p-6 shadow-2xl" style="background: linear-gradient(145deg, #1F5C36, #162F20); border: 1px solid rgba(201,168,76,0.3);">
      <h2 class="text-white text-lg font-semibold mb-5 text-center">Login ဝင်ရောက်ရန်</h2>
      <div class="mb-4">
        <label class="text-xs font-medium uppercase tracking-widest mb-1.5 block" style="color:#E8D5A3;">Email</label>
        <input id="email" type="email" placeholder="your@email.com" autocomplete="email" class="tw-input w-full rounded-xl px-4 py-3 text-sm" />
      </div>
      <div class="mb-5">
        <label class="text-xs font-medium uppercase tracking-widest mb-1.5 block" style="color:#E8D5A3;">Password</label>
        <div class="relative">
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" class="tw-input w-full rounded-xl px-4 py-3 text-sm pr-12" />
          <button onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-green-500 text-lg">👁</button>
        </div>
      </div>
      <div id="error-msg" class="hidden bg-red-900 bg-opacity-50 border border-red-700 text-red-300 text-xs rounded-lg px-3 py-2 mb-4"></div>
      <button id="register-btn" onclick="window.handleLogin()" class="btn-gold w-full rounded-xl py-3.5 text-sm mb-4">Login</button>
      <div class="flex items-center gap-3 mb-4">
        <div class="flex-1 border-t" style="border-color:rgba(201,168,76,0.2)"></div>
        <span class="text-xs" style="color:#E8D5A3;">မရှိသေးဘူးလား?</span>
        <div class="flex-1 border-t" style="border-color:rgba(201,168,76,0.2)"></div>
      </div>
      <a href="/twfpl26-27/pages/register.html"
         class="block text-center border rounded-xl py-3.5 text-sm font-semibold transition-all"
         style="border-color:#C9A84C; color:#C9A84C;"
         onmouseover="this.style.background='rgba(201,168,76,0.1)'"
         onmouseout="this.style.background='transparent'">
        Register လုပ်ရန်
      </a>
    </div>
    <p class="text-center text-xs mt-6" style="color:#3A9E5F;">TW Fantasy Official League © 2026-27</p>
  </div>

  <script>
    function togglePassword() {
      const pwd = document.getElementById("password");
      pwd.type = pwd.type === "password" ? "text" : "password";
    }

    // 💡 🎯 🚀 CRITICAL ENGINE: SERVICE WORKER & AUTO INSTALL ENGINE REGISTER
    // အသုံးပြုသူ ဝဘ်ဆိုက်ထဲ ဝင်လာတာနဲ့ Browser ကနေ App အဖြစ် Install လုပ်မလားဆိုပြီး အော်တို တောင်းဆိုစေမည့် ကုဒ်စနစ်
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/twfpl26-27/sw.js')
          .then(reg => console.log('Service Worker Registered Successfully!', reg))
          .catch(err => console.log('Service Worker Register Failed!', err));
      });
    }

    // Auto Prompt Intercepter
    window.addEventListener('beforeinstallprompt', (e) => {
      // မျက်နှာပြင်ပေါ်သို့ Auto Install Prompt ဘားတန်း ချက်ချင်း တွန်းတင်ခိုင်းခြင်း
      e.preventDefault();
      const deferredPrompt = e;
      setTimeout(() => {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            console.log('User accepted the install prompt');
          }
          window.deferredPrompt = null;
        });
      }, 800); // ဝင်ပြီး ၀.၈ စက္ကန့်အတွင်း အော်တို တက်လာစေမည်
    });
  </script>
</body>
</html>

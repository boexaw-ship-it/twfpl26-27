<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D2B1A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>TW Fantasy League</title>
  <link rel="manifest" href="/twfpl26-27/public/manifest.json" />
  <link rel="apple-touch-icon" href="/twfpl26-27/public/icons/icon-192x192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <script type="module">
    import { auth, db } from "/twfpl26-27/js/firebase-config.js";
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Login ဝင်ပြီးသားဆိုရင် dashboard တန်းပို့
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        window.location.href = "/twfpl26-27/pages/dashboard.html";
      }
    });

    window.handleLogin = async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorEl = document.getElementById("error-msg");
      const btnEl = document.getElementById("login-btn");

      if (!email || !password) {
        errorEl.textContent = "Email နှင့် Password ထည့်ပါ။";
        errorEl.classList.remove("hidden");
        return;
      }

      btnEl.disabled = true;
      btnEl.innerHTML = "⏳ Logging in...";
      errorEl.classList.add("hidden");

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "/twfpl26-27/pages/dashboard.html";
      } catch (err) {
        let msg = "Login မအောင်မြင်ပါ။ ထပ်ကြိုးစားပါ။";
        if (err.code === "auth/user-not-found") msg = "Account မရှိပါ။ Register လုပ်ပါ။";
        if (err.code === "auth/wrong-password") msg = "Password မှားနေသည်။";
        if (err.code === "auth/invalid-email") msg = "Email မှားနေသည်။";
        if (err.code === "auth/invalid-credential") msg = "Email သို့မဟုတ် Password မှားနေသည်။";
        if (err.code === "auth/too-many-requests") msg = "အကြိမ်များလွန်းသည်။ နောက်မှ ထပ်ကြိုးစားပါ။";
        errorEl.textContent = msg;
        errorEl.classList.remove("hidden");
        btnEl.disabled = false;
        btnEl.innerHTML = "Login";
      }
    };

    window.addEventListener("keydown", (e) => {
      if (e.key === "Enter") window.handleLogin();
    });
  </script>

  <style>
    * { 
      -webkit-tap-highlight-color: transparent; 
    }
    
    /* 💡 🎯 🚀 ABSOLUTE ANTI-GOOGLE SELECTION SAFE SYSTEM */
    body { 
      font-family: "Inter", sans-serif; 
      background: #0D2B1A; 
      min-height: 100vh;
      -webkit-user-select: none;  
      -moz-user-select: none;     
      -ms-user-select: none;      
      user-select: none;          
    }
    
    /* Input အကွက်များ၊ ခလုတ်များနှင့် လင့်ခ်များကို ပုံမှန်အတိုင်း အလုပ်လုပ်စေခြင်း */
    input, button, a, span {
      -webkit-user-select: auto !important;
      -moz-user-select: auto !important;
      -ms-user-select: auto !important;
      user-select: auto !important;
    }
    
    .gold-text { background: linear-gradient(135deg, #C9A84C, #F0D060, #A07830); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .glow-gold { box-shadow: 0 0 25px rgba(201, 168, 76, 0.3); }
    .btn-gold { background: linear-gradient(135deg, #C9A84C, #F0D060); color: #0D2B1A; font-weight: 700; letter-spacing: 0.05em; transition: all 0.2s; }
    .btn-gold:active { transform: scale(0.97); }
    .btn-gold:disabled { opacity: 0.7; cursor: not-allowed; }
    .tw-input { background: rgba(13, 43, 26, 0.8); border: 1px solid #2A7A47; color: white; transition: border-color 0.2s; }
    .tw-input:focus { outline: none; border-color: #C9A84C; box-shadow: 0 0 0 2px rgba(201,168,76,0.2); }
    .tw-input::placeholder { color: #3A9E5F; }
    .fade-in { animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen px-6">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-[-100px] left-[-100px] w-80 h-80 rounded-full" style="background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%)"></div>
    <div class="absolute bottom-[-100px] right-[-100px] w-80 h-80 rounded-full" style="background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%)"></div>
  </div>

  <div class="fade-in w-full max-w-sm">
    <div class="flex flex-col items-center mb-8">
      
      <div class="w-24 h-24 rounded-full flex items-center justify-center glow-gold mb-4 bg-[#0d2116]"
           style="border: 2px solid #C9A84C;">
        <span class="gold-text font-black text-4xl tracking-tighter" style="font-family: 'Bebas Neue', sans-serif;">TW</span>
      </div>
      
      <h1 class="gold-text text-3xl font-bold" style="font-family:'Bebas Neue'; letter-spacing:0.1em;">TW FANTASY</h1>
      <p class="text-green-400 text-xs tracking-widest uppercase mt-1">Official Fantasy League</p>
    </div>

    <div class="rounded-2xl p-6 glow-gold" style="background: linear-gradient(145deg, #1F5C36, #162F20); border: 1px solid rgba(201,168,76,0.3); position: relative; z-index: 10;">
      <h2 class="text-white text-lg font-semibold mb-5 text-center">Login ဝင်ရောက်ရန်</h2>
      <div class="mb-4">
        <label class="text-xs font-medium uppercase tracking-widest mb-1.5 block" style="color:#E8D5A3;">Email</label>
        <input id="email" type="email" placeholder="your@email.com" autocomplete="email" class="tw-input w-full rounded-xl px-4 py-3 text-sm" />
      </div>
      <div class="mb-5">
        <label class="text-xs font-medium uppercase tracking-widest mb-1.5 block" style="color:#E8D5A3;">Password</label>
        <div class="relative">
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" class="tw-input w-full rounded-xl px-4 py-3 text-sm pr-12" />
          <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-green-500 text-lg p-1 active:scale-90 transition-all">👁</button>
        </div>
      </div>
      <div id="error-msg" class="hidden bg-red-900 bg-opacity-50 border border-red-700 text-red-300 text-xs rounded-lg px-3 py-2 mb-4"></div>
      
      <button id="login-btn" onclick="window.handleLogin()" class="btn-gold w-full rounded-xl py-3.5 text-sm mb-4">Login</button>
      
      <div class="flex items-center gap-3 mb-4">
        <div class="flex-1 border-t" style="border-color:rgba(201,168,76,0.2)"></div>
        <span class="text-xs" style="color:#E8D5A3;">မရှိသေးဘူးလား?</span>
        <div class="flex-1 border-t" style="border-color:rgba(201,168,76,0.2)"></div>
      </div>
      
      <a href="/twfpl26-27/pages/register.html"
         class="block text-center border rounded-xl py-3.5 text-sm font-semibold transition-all"
         style="border-color:#C9A84C; color:#C9A84C;">
        Register လုပ်ရန်
      </a>
    </div>
    <p class="text-center text-xs mt-6" style="color:#3A9E5F;">TW Fantasy Official League © 2026-27</p>
  </div>

  <script>
    function togglePassword() {
      const pwd = document.getElementById("password");
      pwd.type = pwd.type === "password" ? "text" : "password";
    }

    // PWA SERVICE WORKER SYSTEM
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/twfpl26-27/sw.js')
          .then(reg => console.log('Service Worker Live!', reg))
          .catch(err => console.log('Service Worker Failed!', err));
      });
    }

    // Auto Prompt Trigger
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      const deferredPrompt = e;
      setTimeout(() => {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            console.log('App Installed Successfully');
          }
        });
      }, 1000); 
    });
  </script>
</body>
</html>

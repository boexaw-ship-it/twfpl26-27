<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#F4F7F2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>TW Fantasy League</title>
  <link rel="manifest" href="./public/manifest.json" />
  <link rel="apple-touch-icon" href="./public/icons/icon-192x192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <script type="module">
    import { auth, db } from "./js/firebase-config.js";
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Login ဝင်ပြီးသားဆိုရင် dashboard တန်းပို့
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        window.location.href = "./pages/dashboard.html";
      }
    });

    window.handleLogin = async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorEl = document.getElementById("error-msg");
      const btnEl = document.getElementById("login-btn");

      if (!email || !password) {
        errorEl.textContent = "Email နှင့် Password ထည့်ပါ။";
        errorEl.classList.remove("hidden");
        return;
      }

      btnEl.disabled = true;
      btnEl.innerHTML = "⏳ Logging in...";
      errorEl.classList.add("hidden");

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "./pages/dashboard.html";
      } catch (err) {
        let msg = "Login မအောင်မြင်ပါ။ ထပ်ကြိုးစားပါ။";
        if (err.code === "auth/user-not-found") msg = "Account မရှိပါ။ Register လုပ်ပါ။";
        if (err.code === "auth/wrong-password") msg = "Password မှားနေသည်။";
        if (err.code === "auth/invalid-email") msg = "Email မှားနေသည်။";
        if (err.code === "auth/invalid-credential") msg = "Email သို့မဟုတ် Password မှားနေသည်။";
        if (err.code === "auth/too-many-requests") msg = "အကြိမ်များလွန်းသည်။ နောက်မှ ထပ်ကြိုးစားပါ။";
        errorEl.textContent = msg;
        errorEl.classList.remove("hidden");
        btnEl.disabled = false;
        btnEl.innerHTML = "Login";
      }
    };

    window.addEventListener("keydown", (e) => {
      if (e.key === "Enter") window.handleLogin();
    });
  </script>

  <style>
    * {
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --tw-green-900: #0F2E1C;
      --tw-green-800: #1B4D2E;
      --tw-green-600: #2F7A4F;
      --tw-green-400: #5FA97E;
      --tw-mint-50: #F4F7F2;
      --tw-gold: #C9A84C;
      --tw-text-dim: #4B6357;
    }

    html, body {
      font-family: "Inter", sans-serif;
      background: var(--tw-mint-50);
      min-height: 100vh;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    input, button, a {
      -webkit-user-select: auto !important;
      -moz-user-select: auto !important;
      -ms-user-select: auto !important;
      user-select: auto !important;
    }

    /* ---- Ambient background: soft blurred green/gold blobs on white ---- */
    .bg-scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      background:
        radial-gradient(circle at 15% 8%, rgba(27,77,46,0.14) 0%, transparent 45%),
        radial-gradient(circle at 88% 18%, rgba(201,168,76,0.16) 0%, transparent 40%),
        radial-gradient(circle at 30% 95%, rgba(47,122,79,0.16) 0%, transparent 45%),
        linear-gradient(180deg, #FBFDFA 0%, #F1F6EF 100%);
    }
    .bg-scene::before {
      content: "";
      position: absolute;
      inset: -10%;
      background-image:
        repeating-linear-gradient(90deg, rgba(27,77,46,0.035) 0px, rgba(27,77,46,0.035) 1px, transparent 1px, transparent 64px),
        repeating-linear-gradient(0deg, rgba(27,77,46,0.035) 0px, rgba(27,77,46,0.035) 1px, transparent 1px, transparent 64px);
      mask-image: radial-gradient(circle at 50% 20%, black 0%, transparent 65%);
    }
    .blob {
      position: absolute;
      border-radius: 9999px;
      filter: blur(2px);
      opacity: 0.9;
    }

    /* ---- Glass card system ---- */
    .glass-card {
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow: 0 8px 32px rgba(15,46,28,0.12), inset 0 1px 0 rgba(255,255,255,0.6);
    }
    .glass-pill {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.85);
    }

    .gold-text { background: linear-gradient(135deg, #A98330, #C9A84C, #E8C878); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .green-text { color: var(--tw-green-800); }

    .btn-primary {
      background: linear-gradient(135deg, var(--tw-green-800), var(--tw-green-600));
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.03em;
      box-shadow: 0 10px 24px -8px rgba(27,77,46,0.55);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn-primary:active { transform: scale(0.97); box-shadow: 0 4px 14px -6px rgba(27,77,46,0.5); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-ghost {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(10px);
      border: 1.5px solid rgba(27,77,46,0.35);
      color: var(--tw-green-800);
      font-weight: 600;
      transition: all 0.15s ease;
    }
    .btn-ghost:active { transform: scale(0.97); background: rgba(27,77,46,0.06); }

    .tw-input {
      background: rgba(255,255,255,0.7);
      border: 1.5px solid rgba(27,77,46,0.16);
      color: var(--tw-green-900);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .tw-input:focus { outline: none; border-color: var(--tw-green-600); box-shadow: 0 0 0 3px rgba(47,122,79,0.15); background: #fff; }
    .tw-input::placeholder { color: #9AB0A2; }

    .fade-in { animation: fadeIn 0.7s cubic-bezier(0.16,1,0.3,1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

    .float-slow { animation: floatY 7s ease-in-out infinite; }
    @keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen px-6">
  <div class="bg-scene">
    <div class="blob" style="width:280px;height:280px;top:-90px;left:-90px;background:radial-gradient(circle,rgba(27,77,46,0.22) 0%,transparent 70%);"></div>
    <div class="blob" style="width:260px;height:260px;bottom:-100px;right:-90px;background:radial-gradient(circle,rgba(201,168,76,0.22) 0%,transparent 70%);"></div>
    <div class="blob" style="width:200px;height:200px;top:35%;right:-70px;background:radial-gradient(circle,rgba(47,122,79,0.16) 0%,transparent 70%);"></div>
  </div>

  <div class="fade-in w-full max-w-sm relative" style="z-index:10;">
    <div class="flex flex-col items-center mb-8">
      <div class="w-24 h-24 rounded-full flex items-center justify-center glass-card float-slow mb-4" style="border-color: rgba(27,77,46,0.25);">
        <img src="./public/icons/icon-192x192.png"
             onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block';"
             class="w-16 h-16 rounded-full object-cover" alt="TW FPL Logo" />
        <div id="logo-text" style="display:none; font-family:'Bebas Neue'; font-size:2.2rem; color:var(--tw-green-800);">TW</div>
      </div>
      <h1 class="green-text text-3xl font-bold" style="font-family:'Bebas Neue'; letter-spacing:0.12em;">TW FANTASY</h1>
      <p class="gold-text text-xs font-semibold tracking-[0.25em] uppercase mt-1">Official Fantasy League</p>
    </div>

    <div class="glass-card rounded-3xl p-6" style="position: relative;">
      <h2 class="text-lg font-bold mb-5 text-center" style="color:var(--tw-green-900);">Login ဝင်ရောက်ရန်</h2>

      <div class="mb-4">
        <label class="text-xs font-semibold uppercase tracking-widest mb-1.5 block" style="color:var(--tw-green-600);">Email</label>
        <input id="email" type="email" placeholder="your@email.com" autocomplete="email" class="tw-input w-full rounded-xl px-4 py-3 text-sm" />
      </div>
      <div class="mb-5">
        <label class="text-xs font-semibold uppercase tracking-widest mb-1.5 block" style="color:var(--tw-green-600);">Password</label>
        <div class="relative">
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" class="tw-input w-full rounded-xl px-4 py-3 text-sm pr-12" />
          <button onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-lg" style="color:var(--tw-green-600);">👁</button>
        </div>
      </div>
      <div id="error-msg" class="hidden bg-red-50 border border-red-300 text-red-600 text-xs rounded-lg px-3 py-2 mb-4"></div>

      <button id="login-btn" onclick="window.handleLogin()" class="btn-primary w-full rounded-xl py-3.5 text-sm mb-4">Login</button>

      <div class="flex items-center gap-3 mb-4">
        <div class="flex-1 border-t" style="border-color:rgba(27,77,46,0.15);"></div>
        <span class="text-xs font-medium" style="color:var(--tw-text-dim);">မရှိသေးဘူးလား?</span>
        <div class="flex-1 border-t" style="border-color:rgba(27,77,46,0.15);"></div>
      </div>

      <a href="./pages/register.html" class="btn-ghost block text-center rounded-xl py-3.5 text-sm">
        Register လုပ်ရန်
      </a>
    </div>
    <p class="text-center text-xs mt-6 font-medium" style="color:var(--tw-text-dim);">TW Fantasy Official League © 2026-27</p>
  </div>

  <script>
    function togglePassword() {
      const pwd = document.getElementById("password");
      pwd.type = pwd.type === "password" ? "text" : "password";
    }

    // 💡 🎯 🚀 PWA AUTO INSTALL SERVICE WORKER SYSTEM
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker Live!', reg))
          .catch(err => console.log('Service Worker Failed!', err));
      });
    }

    // Auto Prompt Trigger
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      const deferredPrompt = e;
      setTimeout(() => {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            console.log('App Installed Successfully');
          }
        });
      }, 1000);
    });
  </script>
</body>
</html>

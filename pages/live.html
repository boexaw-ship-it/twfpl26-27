<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1B4D2E" />
  <title>Live — TW Fantasy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <script type="module">
    import { auth, db } from "/twfpl26-27/js/firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc, onSnapshot, collection, addDoc, orderBy, query, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let currentUser = null;
    let currentTeamName = "";
    let isApproved = false;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "/twfpl26-27/index.html"; return; }
      currentUser = user;

      onSnapshot(doc(db, "users", user.uid), (snap) => {
        if (!snap.exists()) return;
        const data = snap.data();
        currentTeamName = data.teamName || "";
        document.getElementById("user-team").textContent = currentTeamName;
        isApproved = data.status === "approved";
        updateChatLock();

        if (data.fplTeamId) {
          onSnapshot(doc(db, "livePoints", data.fplTeamId), (d) => {
            if (d.exists()) {
              document.getElementById("gw-points").textContent = d.data().gwPoints ?? "—";
              document.getElementById("overall-pts").textContent = d.data().totalPoints ?? "—";
              document.getElementById("captain-pts").textContent = d.data().captainPoints ?? "—";
              document.getElementById("gw-rank").textContent = d.data().gwRank ?? "—";
            }
          });
          onSnapshot(doc(db, "liveTeams", data.fplTeamId), (d) => {
            if (d.exists()) renderPitch(d.data());
          });
        }
      });

      loadChat();
    });

    function playerCard(p) {
      const ring = p.isCaptain ? '#F0D060' : p.isVice ? '#C0C0C0' : '#2A7A47';
      const badge = p.isCaptain
        ? '<span style="font-size:0.55rem;background:#F0D060;color:#0D2B1A;border-radius:9999px;padding:0 3px;font-weight:900;">C</span>'
        : p.isVice
        ? '<span style="font-size:0.55rem;background:#C0C0C0;color:#0D2B1A;border-radius:9999px;padding:0 3px;font-weight:900;">V</span>'
        : '';
      return `<div class="flex flex-col items-center" style="flex-shrink:0;">
        <div class="w-9 h-9 rounded-full flex items-center justify-center text-base mb-1" style="background:#1F5C36;border:2px solid ${ring};">👕</div>
        <p class="text-white text-center font-medium" style="font-size:0.55rem;max-width:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name || "?"}</p>
        <div class="flex items-center gap-1 mt-0.5">
          <span style="font-size:0.6rem;color:#C9A84C;font-weight:700;">${p.livePoints ?? 0}</span>
          ${badge}
        </div>
      </div>`;
    }

    function renderPitch(data) {
      const picks = data.picks || [];
      const starters = picks.filter(p => p.multiplier > 0);
      const subs = picks.filter(p => p.multiplier === 0);
      const gk = starters.filter(p => p.position === "GK");
      const def = starters.filter(p => p.position === "DEF");
      const mid = starters.filter(p => p.position === "MID");
      const fwd = starters.filter(p => p.position === "FWD");
      const render = (players) => `<div class="flex justify-center flex-nowrap gap-1.5">${players.map(playerCard).join("")}</div>`;

      document.getElementById("pitch").innerHTML = `
        <div class="space-y-3">
          ${render(gk)}
          <div style="border-top:1px solid rgba(201,168,76,0.15);"></div>
          ${render(def)}
          <div style="border-top:1px solid rgba(201,168,76,0.15);"></div>
          ${render(mid)}
          <div style="border-top:1px solid rgba(201,168,76,0.15);"></div>
          ${render(fwd)}
        </div>
        <div style="border-top:2px dashed rgba(201,168,76,0.3);margin:10px 0;"></div>
        <div class="flex justify-center flex-nowrap gap-1.5">${subs.map(playerCard).join("")}</div>`;
    }

    function updateChatLock() {
      const input = document.getElementById("chat-input");
      const sendBtn = document.getElementById("send-btn");
      const lockBanner = document.getElementById("chat-lock-banner");
      if (isApproved) {
        input.disabled = false;
        input.placeholder = "Message ရိုက်ပါ...";
        sendBtn.disabled = false;
        sendBtn.style.opacity = "1";
        lockBanner.classList.add("hidden");
      } else {
        input.disabled = true;
        input.placeholder = "Approve ပြီးမှ Chat ရေးနိုင်သည်";
        sendBtn.disabled = true;
        sendBtn.style.opacity = "0.4";
        lockBanner.classList.remove("hidden");
      }
    }

    function loadChat() {
      const q = query(collection(db, "chat"), orderBy("createdAt", "desc"), limit(50));
      onSnapshot(q, (snapshot) => {
        const msgs = [];
        snapshot.forEach(d => msgs.unshift({ id: d.id, ...d.data() }));
        const chatEl = document.getElementById("chat-messages");
        if (msgs.length === 0) {
          chatEl.innerHTML = `<p class="text-center text-xs py-8" style="color:#3A9E5F;">Chat မစသေးပါ — ပထမဆုံး Message ရေးလိုက်ပါ</p>`;
          return;
        }
        chatEl.innerHTML = msgs.map(m => {
          const isSelf = m.uid === currentUser?.uid;
          const time = m.createdAt?.toDate ? m.createdAt.toDate().toLocaleTimeString("en", { hour: "2-digit", minute: "2-digit" }) : "";
          return isSelf
            ? `<div class="flex flex-col items-end mb-3">
                <div class="text-xs mb-1" style="color:#C9A84C;">${m.teamName}</div>
                <div class="rounded-2xl rounded-br-sm px-4 py-2 text-sm max-w-xs" style="background:linear-gradient(135deg,#C9A84C,#F0D060);color:#0D2B1A;font-weight:500;">${m.text}</div>
                <div class="text-xs mt-1" style="color:#3A9E5F;">${time}</div>
               </div>`
            : `<div class="flex flex-col items-start mb-3">
                <div class="text-xs mb-1" style="color:#E8D5A3;">${m.teamName}</div>
                <div class="rounded-2xl rounded-bl-sm px-4 py-2 text-sm max-w-xs" style="background:#1F5C36;color:white;">${m.text}</div>
                <div class="text-xs mt-1" style="color:#3A9E5F;">${time}</div>
               </div>`;
        }).join("");
        chatEl.scrollTop = chatEl.scrollHeight;
      });
    }

    window.sendMessage = async () => {
      if (!isApproved) return;
      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if (!text || !currentUser) return;
      input.value = "";
      await addDoc(collection(db, "chat"), { text, teamName: currentTeamName, uid: currentUser.uid, createdAt: serverTimestamp() });
    };

    window.handleKeydown = (e) => { if (e.key === "Enter" && isApproved) window.sendMessage(); };
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: "Inter", sans-serif; background: #0D2B1A; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .gold-text { background: linear-gradient(135deg, #C9A84C, #F0D060, #A07830); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 12px; color:#3A9E5F; cursor:pointer; }
    .nav-item.active { color:#C9A84C; }
    #chat-messages::-webkit-scrollbar, #pitch-wrap::-webkit-scrollbar { width:3px; }
    #chat-messages::-webkit-scrollbar-thumb, #pitch-wrap::-webkit-scrollbar-thumb { background:#C9A84C; border-radius:2px; }
    .stat-card { background:#1F5C36; border:1px solid #2A7A47; border-radius:0.85rem; padding:10px 8px; text-align:center; }
  </style>
</head>
<body>
  <!-- Top Bar -->
  <div style="background:#0D2B1A;border-bottom:1px solid #1F5C36;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div class="flex items-center gap-2">
      <a href="/twfpl26-27/pages/dashboard.html" style="color:#3A9E5F;font-size:1.2rem;">←</a>
      <h1 class="gold-text font-bold" style="font-family:'Bebas Neue';letter-spacing:0.1em;font-size:1.2rem;">LIVE</h1>
      <span class="text-xs px-2 py-0.5 rounded-full font-bold animate-pulse" style="background:#dc2626;color:white;">LIVE</span>
    </div>
    <span id="user-team" class="text-xs font-semibold" style="color:#E8D5A3;"></span>
  </div>

  <!-- Pitch + Stats (50%) -->
  <div id="pitch-wrap" style="flex:1;min-height:0;overflow:hidden;border-bottom:2px solid rgba(201,168,76,0.3);display:flex;" class="px-3 py-3">
    <div class="flex gap-3" style="width:100%;height:100%;min-height:0;">
      <!-- Pitch -->
      <div id="pitch" style="flex:1;background:linear-gradient(180deg,#1a5c30,#0f3d1e);border-radius:1rem;padding:10px 4px;border:1px solid rgba(201,168,76,0.2);min-width:0;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;">
        <p class="text-center text-xs py-8" style="color:#3A9E5F;">Team loading...</p>
      </div>

      <!-- Stats Column -->
      <div style="width:108px;flex-shrink:0;height:100%;overflow-y:auto;" class="flex flex-col gap-2">
        <div class="rounded-xl p-3" style="background:linear-gradient(145deg,#1F5C36,#162F20);border:1px solid rgba(201,168,76,0.25);">
          <p class="text-xs uppercase tracking-wide mb-1" style="color:#C9A84C;font-size:0.55rem;">Gameweek</p>
          <div class="flex items-end gap-1">
            <span id="gw-points" class="font-bold" style="font-family:'Bebas Neue';font-size:1.8rem;line-height:1;color:#C9A84C;">—</span>
            <span style="font-size:0.6rem;color:#E8D5A3;">pts</span>
          </div>
        </div>
        <div class="stat-card">
          <p style="font-size:0.55rem;color:#3A9E5F;">GW Rank</p>
          <p id="gw-rank" class="font-bold text-white" style="font-family:'Bebas Neue';font-size:1rem;">—</p>
        </div>
        <div class="stat-card">
          <p style="font-size:0.55rem;color:#3A9E5F;">Overall</p>
          <p id="overall-pts" class="font-bold text-white" style="font-family:'Bebas Neue';font-size:1rem;">—</p>
        </div>
        <div class="stat-card">
          <p style="font-size:0.55rem;color:#3A9E5F;">Captain</p>
          <p id="captain-pts" class="font-bold" style="font-family:'Bebas Neue';font-size:1rem;color:#C9A84C;">—</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat (50%) -->
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <div style="padding:8px 16px;border-bottom:1px solid #1F5C36;flex-shrink:0;">
      <p class="text-xs font-semibold uppercase tracking-widest" style="color:#C9A84C;">💬 Live Chat</p>
    </div>

    <div id="chat-lock-banner" class="hidden" style="padding:8px 16px;background:rgba(201,168,76,0.08);border-bottom:1px solid rgba(201,168,76,0.2);flex-shrink:0;">
      <p class="text-xs" style="color:#E8D5A3;">🔒 Approve ပြီးမှ Chat ရေးနိုင်ပါမည် — View ကိုတော့ ကြည့်ရှုနိုင်ပါသည်</p>
    </div>

    <div id="chat-messages" style="flex:1;overflow-y:auto;padding:12px 16px;"></div>

    <div style="padding:8px 12px;border-top:1px solid #1F5C36;display:flex;gap:8px;align-items:center;flex-shrink:0;background:#0D2B1A;">
      <input id="chat-input" type="text" placeholder="Message ရိုက်ပါ..." onkeydown="handleKeydown(event)" disabled
        style="flex:1;background:#1F5C36;border:1px solid #2A7A47;color:white;border-radius:0.75rem;padding:10px 14px;font-size:0.85rem;outline:none;"
        onfocus="this.style.borderColor='#C9A84C'" onblur="this.style.borderColor='#2A7A47'" />
      <button id="send-btn" onclick="sendMessage()" disabled style="opacity:0.4;background:linear-gradient(135deg,#C9A84C,#F0D060);color:#0D2B1A;border-radius:0.75rem;padding:10px 16px;font-weight:700;font-size:0.85rem;">Send</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div style="background:#0D2B1A;border-top:1px solid #1F5C36;display:flex;justify-content:space-around;align-items:center;padding:4px 0;flex-shrink:0;">
    <div class="nav-item" onclick="window.location.href='/twfpl26-27/pages/dashboard.html'"><span style="font-size:1.3rem;">🏠</span><span style="font-size:0.6rem;">Home</span></div>
    <div class="nav-item active"><span style="font-size:1.3rem;">⚡</span><span style="font-size:0.6rem;">Live</span></div>
    <div class="nav-item" onclick="window.location.href='/twfpl26-27/pages/leagues.html'"><span style="font-size:1.3rem;">🏆</span><span style="font-size:0.6rem;">League</span></div>
    <div class="nav-item" onclick="window.location.href='/twfpl26-27/pages/fixtures.html'"><span style="font-size:1.3rem;">⚽</span><span style="font-size:0.6rem;">Fixtures</span></div>
    <div class="nav-item" onclick="window.location.href='/twfpl26-27/pages/scout.html'"><span style="font-size:1.3rem;">🔍</span><span style="font-size:0.6rem;">Scout</span></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1B4D2E" />
  <title>Live — TW Fantasy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/live.css" />
  <script type="module" src="../js/live.js"></script>
</head>
<body>

  <div class="top-bar flex-shrink-0">
    <div class="header-main-row">
      <div class="flex items-center gap-1.5">
        <a href="../pages/dashboard.html" class="back-arrow-btn">←</a>
        <h1 class="font-bold text-white tracking-widest text-[1.2rem]" style="font-family:'Bebas Neue';">LIVE</h1>
        <span class="text-[9px] px-1.5 py-0.5 rounded-full font-bold animate-pulse bg-red-600 text-white">LIVE</span>
      </div>

      <div class="flex items-center gap-2">
        <div class="rank-pill flex items-center gap-1">
          <span class="text-[9px] font-bold uppercase tracking-wider text-white/70">OR</span>
          <span id="overall-rank" class="text-xs font-black text-white">—</span>
        </div>
        <span id="user-team" class="team-name-frame text-xs font-black tracking-wide text-white"></span>
      </div>
    </div>

    <div class="static-stat-grid">
      <div class="stat-box-cell">
        <span class="cell-label">GW PTS</span>
        <span id="gw-points" class="cell-value color-green">—</span>
      </div>
      <div class="stat-box-cell">
        <span class="cell-label">CAPTAIN</span>
        <span id="captain-pts" class="cell-value color-gold">—</span>
      </div>
      <div class="stat-box-cell">
        <span class="cell-label">HIT</span>
        <span id="hit-label" class="cell-value color-red">-0</span>
      </div>
      <div class="stat-box-cell">
        <span class="cell-label">CHIP</span>
        <span id="chip-badge" class="cell-value color-gold text-[10px]">NO CHIP</span>
      </div>
    </div>
  </div>

  <div class="content-split">
    <div id="pitch-wrap" class="pitch-pane px-2.5 py-1.5">
      <div class="pitch-container-frame">
        <div id="pitch-scroll-wrapper" class="pitch-scroll-layer">
          <div class="main-scroll-pitch-canvas">
            <svg class="pitch-vector-lines" viewBox="0 0 200 390" preserveAspectRatio="none">
              <rect x="6" y="6" width="188" height="378" fill="none" stroke="white" stroke-width="1.2"/>
              <line x1="6" y1="195" x2="194" y2="195" stroke="white" stroke-width="1.2"/>
              <circle cx="100" cy="195" r="24" fill="none" stroke="white" stroke-width="1.2"/>
              <rect x="36" y="6" width="128" height="42" fill="none" stroke="white" stroke-width="1.2"/>
              <rect x="36" y="342" width="128" height="42" fill="none" stroke="white" stroke-width="1.2"/>
              <rect x="66" y="6" width="68" height="14" fill="none" stroke="white" stroke-width="1.2"/>
              <rect x="66" y="370" width="68" height="14" fill="none" stroke="white" stroke-width="1.2"/>
            </svg>
            <div id="pitch" class="pitch-roster-canvas">
              <p class="text-center text-xs py-8 text-[#88b89b]">Team loading...</p>
            </div>
          </div>
          <div id="bench-container" class="w-full flex-shrink-0 padding-bottom:4px;"></div>
        </div>
      </div>
    </div>

    <div class="chat-pane">
      <div class="chat-header-row">
        <p class="text-xs font-semibold uppercase tracking-widest text-[#1B4D2E]">💬 Live Chat</p>
      </div>

      <div id="chat-lock-banner" class="hidden chat-banner-alert">
        <p class="text-xs text-[#8A6D22]">🔒 Chat unlocks once your account is approved — you can browse messages now.</p>
      </div>

      <div id="chat-messages" class="chat-body-viewport"></div>

      <div id="reply-preview-bar" class="hidden px-4 py-2 flex items-center justify-between border-t bg-[#FAFCFA] border-[#E7ECE7]">
        <div class="flex flex-col min-w-0 flex-1">
          <span id="reply-target-name" class="text-[10px] font-bold text-[#8A6D22]">Reply to user</span>
          <span id="reply-target-text" class="text-xs truncate text-[#7A8B82]">Message text...</span>
        </div>
        <button onclick="window.cancelReply()" class="text-xs font-bold px-2 py-1 text-red-600 bg-red-50 rounded-md ml-2">✖</button>
      </div>

      <div class="chat-input-dock">
        <input id="chat-input" type="text" placeholder="Type a message..." onkeydown="window.handleKeydown(event)" disabled />
        <button id="send-btn" onclick="window.sendMessage()" disabled>Send</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='../pages/dashboard.html'"><span class="text-[1.2rem]">🏠</span><span>Home</span></div>
    <div class="nav-item active"><span class="text-[1.2rem]">⚡</span><span>Live</span></div>
    <div class="nav-item" onclick="window.location.href='../pages/leagues.html'"><span class="text-[1.2rem]">🏆</span><span>League</span></div>
    <div class="nav-item" onclick="window.location.href='../pages/fixtures.html'"><span class="text-[1.2rem]">⚽</span><span>Fixtures</span></div>
    <div class="nav-item" onclick="window.location.href='../pages/scout.html'"><span class="text-[1.2rem]">🔍</span><span>Scout</span></div>
  </div>

  <div id="message-options-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
    <div class="w-full max-w-xs rounded-xl p-4 flex flex-col gap-3 shadow-2xl bg-white border border-[#E7ECE7]">
      <p id="modal-msg-preview" class="text-xs truncate border-b pb-2 text-[#7A8B82] border-[#E7ECE7]"></p>
      <button id="modal-reply-btn" class="w-full text-white font-bold py-2.5 rounded-lg text-sm transition-all bg-[#1B4D2E]">💬 Reply</button>
      <button id="modal-delete-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 rounded-lg text-sm transition-all hidden">🗑️ Delete message</button>
      <button onclick="window.closeOptionsModal()" class="w-full text-xs py-1 mt-1 font-medium text-[#7A8B82]">Cancel</button>
    </div>
  </div>

</body>
</html>

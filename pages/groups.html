<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1B4D2E" />
  <title>Groups — TW Fantasy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const firebaseConfig = { apiKey:"YOUR_API_KEY", authDomain:"YOUR_AUTH_DOMAIN", projectId:"YOUR_PROJECT_ID", storageBucket:"YOUR_STORAGE_BUCKET", messagingSenderId:"YOUR_MESSAGING_SENDER_ID", appId:"YOUR_APP_ID" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href="/index.html"; return; }
      const snap = await getDoc(doc(db,"users",user.uid));
      if (!snap.exists() || snap.data().status !== "approved") { window.location.href="/pages/pending.html"; return; }
      loadGroups();
    });

    function loadGroups() {
      const groups = ["A","B","C","D","E","F","G","H"];
      groups.forEach(g => {
        onSnapshot(collection(db,"tournament","groups",g), (snapshot) => {
          const teams = [];
          snapshot.forEach(d => teams.push(d.data()));
          teams.sort((a,b)=>b.pts-a.pts||(b.gd-a.gd)||(b.gf-a.gf));
          const el = document.getElementById("group-"+g);
          if(!el) return;
          el.innerHTML = `
            <div class="rounded-xl overflow-hidden mb-4" style="border:1px solid rgba(201,168,76,0.2);">
              <div class="px-3 py-2" style="background:rgba(201,168,76,0.15);">
                <p class="text-xs font-bold uppercase tracking-widest" style="color:#C9A84C;">Group ${g}</p>
              </div>
              <div style="background:#1F5C36;">
                <div class="flex text-xs px-3 py-1.5" style="color:#3A9E5F;border-bottom:1px solid #2A7A47;">
                  <span class="w-5">#</span><span class="flex-1">Team</span>
                  <span class="w-6 text-center">P</span><span class="w-6 text-center">W</span>
                  <span class="w-6 text-center">D</span><span class="w-6 text-center">L</span>
                  <span class="w-8 text-center font-bold" style="color:#C9A84C;">Pts</span>
                </div>
                ${teams.map((t,i)=>`
                <div class="flex items-center text-xs px-3 py-2 ${i<2?'':'opacity-80'}" style="border-bottom:1px solid rgba(42,122,71,0.4);${i<2?'background:rgba(201,168,76,0.05);':''}">
                  <span class="w-5 font-bold" style="color:${i<2?'#C9A84C':'#3A9E5F'};">${i+1}</span>
                  <span class="flex-1 font-medium text-white">${t.teamName||"—"}</span>
                  <span class="w-6 text-center text-white">${t.played||0}</span>
                  <span class="w-6 text-center text-white">${t.won||0}</span>
                  <span class="w-6 text-center text-white">${t.drawn||0}</span>
                  <span class="w-6 text-center text-white">${t.lost||0}</span>
                  <span class="w-8 text-center font-bold" style="color:#C9A84C;">${t.pts||0}</span>
                </div>`).join("")}
              </div>
            </div>`;
        });
      });
    }
  </script>
  <style>
    *{-webkit-tap-highlight-color:transparent;}
    body{font-family:"Inter",sans-serif;background:#0D2B1A;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
    .gold-text{background:linear-gradient(135deg,#C9A84C,#F0D060,#A07830);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  </style>
</head>
<body>
  <div style="background:#0D2B1A;border-bottom:1px solid #1F5C36;padding:12px 16px;display:flex;align-items:center;flex-shrink:0;">
    <a href="/pages/tournament.html" style="color:#3A9E5F;font-size:1.2rem;margin-right:8px;">←</a>
    <h1 class="gold-text font-bold" style="font-family:'Bebas Neue';letter-spacing:0.1em;font-size:1.3rem;">GROUP STAGE</h1>
  </div>
  <div style="flex:1;overflow-y:auto;" class="px-4 py-4">
    <div id="group-A"></div><div id="group-B"></div><div id="group-C"></div><div id="group-D"></div>
    <div id="group-E"></div><div id="group-F"></div><div id="group-G"></div><div id="group-H"></div>
  </div>
</body>
</html>

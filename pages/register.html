<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1B4D2E" />
  <title>Register — TW Fantasy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <script type="module" src="../js/register.js"></script>
  <link rel="stylesheet" href="../css/register.css" />
</head>
<body class="flex items-center justify-center min-h-screen px-6 py-10">
  <div class="fade-in w-full max-w-sm">
    <div class="flex items-center mb-6">
      <a href="../index.html" class="text-green-400 mr-3 text-xl">←</a>
      <div>
        <h1 class="gold-text text-2xl font-bold" style="font-family:'Bebas Neue';letter-spacing:0.1em;">TW FANTASY</h1>
        <p class="text-green-400 text-xs tracking-widest uppercase">Account Register</p>
      </div>
    </div>
    <div class="rounded-2xl p-6" style="background:linear-gradient(145deg,#1F5C36,#162F20);border:1px solid rgba(201,168,76,0.3);box-shadow:0 0 25px rgba(201,168,76,0.15);">
      <h2 class="text-white text-lg font-semibold mb-5 text-center">အကောင့် ဖွင့်ရန်</h2>
      <div class="mb-4">
        <label class="block text-xs font-medium uppercase tracking-widest mb-1.5" style="color:#E8D5A3;">Team Name</label>
        <input id="teamName" type="text" placeholder="မင်းရဲ့ Team နာမည်" class="tw-input w-full rounded-xl px-4 py-3 text-sm" />
      </div>
      <div class="mb-4">
        <label class="block text-xs font-medium uppercase tracking-widest mb-1.5" style="color:#E8D5A3;">FPL Team ID</label>
        <input id="fplId" type="number" placeholder="FPL Team ID နံပါတ်" class="tw-input w-full rounded-xl px-4 py-3 text-sm" />
        <p class="text-xs mt-1" style="color:#3A9E5F;">fantasy.premierleague.com မှာ မင်းရဲ့ Team ID ကိုယူပါ</p>
      </div>
      <div class="mb-4">
        <label class="block text-xs font-medium uppercase tracking-widest mb-1.5" style="color:#E8D5A3;">Email</label>
        <input id="email" type="email" placeholder="your@email.com" class="tw-input w-full rounded-xl px-4 py-3 text-sm" />
      </div>
      <div class="mb-5">
        <label class="block text-xs font-medium uppercase tracking-widest mb-1.5" style="color:#E8D5A3;">Password</label>
        <input id="password" type="password" placeholder="အနည်းဆုံး ၆ လုံး" class="tw-input w-full rounded-xl px-4 py-3 text-sm" />
      </div>
      <div id="error-msg" class="hidden bg-red-900 bg-opacity-50 border border-red-700 text-red-300 text-xs rounded-lg px-3 py-2 mb-4"></div>
      <button id="register-btn" onclick="handleRegister()" class="btn-gold w-full rounded-xl py-3.5 text-sm mb-4">Register လုပ်ရန်</button>
      <p class="text-center text-xs" style="color:#E8D5A3;">Account ရှိပြီးသားလား?
        <a href="../index.html" style="color:#C9A84C;" class="font-semibold"> Login ဝင်ရန်</a>
      </p>
    </div>
    <p class="text-center text-xs mt-6" style="color:#3A9E5F;">TW Fantasy Official League © 2026-27</p>
  </div>
</body>
</html>

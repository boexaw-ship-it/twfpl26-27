<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1B4D2E" />
  <title>Leagues — TW Fantasy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <script type="module">
    import { auth, db } from "/twfpl26-27/js/firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let league1Data = [];
    let league2Data = [];
    let sortMode = "total"; // "total" or "gw"

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "/twfpl26-27/index.html"; return; }
      const snap = await getDoc(doc(db, "users", user.uid));
      if (!snap.exists()) { window.location.href = "/twfpl26-27/index.html"; return; }

      onSnapshot(query(collection(db, "leagues", "league1", "standings")), (snapshot) => {
        league1Data = [];
        snapshot.forEach(d => league1Data.push(d.data()));
        renderTable("league1");
      });

      onSnapshot(query(collection(db, "leagues", "league2", "standings")), (snapshot) => {
        league2Data = [];
        snapshot.forEach(d => league2Data.push(d.data()));
        renderTable("league2");
      });
    });

    const CHIP_LABELS = { "3xc": "TC", "bboost": "BB", "wildcard": "WC", "freehit": "FH", "manager": "AM" };

    function chipBadge(chipCode) {
      if (!chipCode || !CHIP_LABELS[chipCode]) return "";
      return `<span class="text-[9px] font-bold px-1.5 py-0.5 rounded" style="background:rgba(201,168,76,0.25);color:#C9A84C;margin-left:4px;">${CHIP_LABELS[chipCode]}</span>`;
    }

    function hitBadge(hitCost) {
      if (!hitCost || hitCost === 0) return "";
      return `<span class="text-[9px] font-bold" style="color:#f87171;margin-left:4px;" title="${hitCost} points deducted for extra transfers">(-${hitCost})</span>`;
    }

    function renderTable(firebaseId) {
      const data = firebaseId === "league1" ? league1Data : league2Data;
      const tableId = firebaseId === "league1" ? "league1-table" : "league2-table";
      const el = document.getElementById(tableId);

      if (data.length === 0) {
        el.innerHTML = `<p class="text-center text-xs py-6" style="color:#3A9E5F;">Data မရှိသေးပါ</p>`;
        return;
      }

      const sorted = [...data].sort((a, b) => {
        if (sortMode === "gw") return (b.gwPoints ?? 0) - (a.gwPoints ?? 0);
        return (b.points ?? 0) - (a.points ?? 0);
      });

      const rows = sorted.map((r, i) => ({ ...r, rank: i + 1 }));

      el.innerHTML = `
        <div class="flex items-center px-3 py-1.5 text-xs" style="color:#3A9E5F;border-bottom:1px solid #2A7A47;">
          <span class="w-6">#</span>
          <span class="flex-1">Team</span>
          <span class="w-12 text-center">GW</span>
          <span class="w-14 text-center font-bold" style="color:#C9A84C;">Total</span>
        </div>
        ${rows.map(r => `
        <div class="flex items-center py-2.5 px-3 rounded-xl mb-1" style="background:${r.rank <= 3 ? 'rgba(201,168,76,0.1)' : '#1F5C36'};border:1px solid ${r.rank <= 3 ? 'rgba(201,168,76,0.3)' : '#2A7A47'};">
          <span class="text-sm font-bold w-6 text-center" style="color:${r.rank === 1 ? '#F0D060' : r.rank === 2 ? '#C0C0C0' : r.rank === 3 ? '#CD7F32' : '#3A9E5F'};">${r.rank}</span>
          <div class="flex-1 min-w-0">
            <div class="flex items-center flex-wrap">
              <span class="text-sm font-medium text-white truncate" style="max-width:120px;">${r.teamName || "—"}</span>
              ${chipBadge(r.chip)}
              ${hitBadge(r.hitCost)}
            </div>
          </div>
          <span class="w-12 text-center text-sm font-semibold ${sortMode === 'gw' ? 'text-yellow-400' : 'text-white'}">${r.gwPoints ?? 0}</span>
          <span class="w-14 text-center font-bold ${sortMode === 'total' ? '' : 'opacity-60'}" style="font-family:'Bebas Neue';font-size:1.1rem;color:#C9A84C;">${r.points ?? 0}</span>
        </div>`).join("")}
      `;
    }

    window.switchTab = (tab) => {
      ["league1", "league2"].forEach(t => {
        const btn = document.getElementById("tab-" + t);
        if (t === tab) {
          btn.style.background = "linear-gradient(135deg,#C9A84C,#F0D060)";
          btn.style.color = "#0D2B1A";
        } else {
          btn.style.background = "transparent";
          btn.style.color = "#3A9E5F";
        }
        document.getElementById("panel-" + t).style.display = t === tab ? "block" : "none";
      });
    };

    window.switchSort = (mode) => {
      sortMode = mode;
      ["total", "gw"].forEach(m => {
        const btn = document.getElementById("sort-" + m);
        if (m === mode) {
          btn.style.background = "rgba(201,168,76,0.25)";
          btn.style.color = "#C9A84C";
          btn.style.borderColor = "#C9A84C";
        } else {
          btn.style.background = "transparent";
          btn.style.color = "#3A9E5F";
          btn.style.borderColor = "#2A7A47";
        }
      });
      renderTable("league1");
      renderTable("league2");
    };
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: "Inter", sans-serif; background: #0D2B1A; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .gold-text { background: linear-gradient(135deg, #C9A84C, #F0D060, #A07830); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 12px; color:#3A9E5F; cursor:pointer; }
    .nav-item.active { color:#C9A84C; }
    .truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  </style>
</head>
<body>
  <!-- Top Bar -->
  <div style="background:#0D2B1A;border-bottom:1px solid #1F5C36;padding:12px 16px;display:flex;align-items:center;flex-shrink:0;">
    <a href="/twfpl26-27/pages/dashboard.html" style="color:#3A9E5F;font-size:1.2rem;margin-right:8px;">←</a>
    <h1 class="gold-text font-bold" style="font-family:'Bebas Neue';letter-spacing:0.1em;font-size:1.3rem;">LEAGUES</h1>
  </div>

  <!-- League Tabs — Button style -->
  <div style="padding:10px 16px 4px;flex-shrink:0;display:flex;gap:8px;">
    <button id="tab-league1" onclick="switchTab('league1')"
      style="flex:1;padding:10px;font-size:0.8rem;font-weight:700;border-radius:0.75rem;background:linear-gradient(135deg,#C9A84C,#F0D060);color:#0D2B1A;border:none;cursor:pointer;">
      🗓 Weekly League
    </button>
    <button id="tab-league2" onclick="switchTab('league2')"
      style="flex:1;padding:10px;font-size:0.8rem;font-weight:700;border-radius:0.75rem;background:transparent;color:#3A9E5F;border:1px solid #2A7A47;cursor:pointer;">
      👥 All Friends
    </button>
  </div>

  <!-- 💡 ပြင်ဆင်ချက်: ဗရမ်းဗတာဖြစ်နေသော နေရာများကို ရှင်းလင်းလှပသည့် VIP Sheet Frame ကြီးတစ်ခုတည်းအဖြစ် စုစည်းပေါင်းစပ်လိုက်ခြင်း -->
  <div style="padding:6px 16px 8px; flex-shrink:0;">
    <div style="background:#124c2a; border:1px solid #1e6a3c; border-radius:0.85rem; padding:12px 14px; box-shadow:0 4px 10px rgba(0,0,0,0.25);" class="space-y-3.5">
      
      <!-- 1️⃣ Chip Labels Row -->
      <div style="display:flex; gap:8px; align-items:center;">
        <span class="text-xs font-bold uppercase tracking-wider" style="color:#3A9E5F; font-size:0.68rem;">Chips:</span>
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          <span class="text-[10px] font-black px-2.5 py-1 rounded bg-black/30 border border-yellow-500/20 text-yellow-500">TC</span>
          <span class="text-[10px] font-black px-2.5 py-1 rounded bg-black/30 border border-yellow-500/20 text-yellow-500">BB</span>
          <span class="text-[10px] font-black px-2.5 py-1 rounded bg-black/30 border border-yellow-500/20 text-yellow-500">WC</span>
          <span class="text-[10px] font-black px-2.5 py-1 rounded bg-black/30 border border-yellow-500/20 text-yellow-500">FH</span>
        </div>
      </div>

      <!-- 2️⃣ Hit Info & Sort Toggle Row (ဘယ်/ညာ ကွက်တိ တစ်တန်းတည်း ချိန်ညှိခြင်း) -->
      <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
        <!-- Left: Hit text -->
        <span class="text-[11px] font-medium" style="color:#E8D5A3;">
          <span style="color:#f87171; font-weight:900;">(-4)</span> = ဒီ GW မှာ နုတ်ခံရသည့် Hit Points
        </span>
        
        <!-- Right: Sort Buttons Frame -->
        <div style="display:flex; background:#0D2B1A; border:1px solid #2A7A47; border-radius:9999px; padding:2px; flex-shrink:0;">
          <button id="sort-total" onclick="switchSort('total')"
            style="padding:4px 12px; font-size:0.68rem; font-weight:800; border-radius:9999px; background:rgba(201,168,76,0.25); color:#C9A84C; border:none; cursor:pointer; transition:all 0.2s;">
            Total
          </button>
          <button id="sort-gw" onclick="switchSort('gw')"
            style="padding:4px 12px; font-size:0.68rem; font-weight:800; border-radius:9999px; background:transparent; color:#3A9E5F; border:none; cursor:pointer; transition:all 0.2s;">
            This GW
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- Content Table (ကျန်တဲ့ Table ပိုင်း အကုန် အဆင်ပြေပြေ ပေါ်နေပါမည်) -->
  <div style="flex:1;overflow-y:auto;" class="px-4 py-1">
    <div id="panel-league1">
      <div id="league1-table"><p class="text-center text-xs py-4" style="color:#3A9E5F;">Loading...</p></div>
    </div>
    <div id="panel-league2" style="display:none;">
      <div id="league2-table"><p class="text-center text-xs py-4" style="color:#3A9E5F;">Loading...</p></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div style="background:#0D2B1A;border-top:1px solid #1F5C36;display:flex;justify-content:space-around;align-items:center;padding:4px 0;flex-shrink:0;">
    <div class="nav-item" onclick="window.location.href='/twfpl26-27/pages/dashboard.html'"><span style="font-size:1.3rem;">🏠</span><span style="font-size:0.6rem;">Home</span></div>
    <div class="nav-item" onclick="window.location.href='/twfpl26-27/pages/live.html'"><span style="font-size:1.3rem;">⚡</span><span style="font-size:0.6rem;">Live</span></div>
    <div class="nav-item active"><span style="font-size:1.3rem;">🏆</span><span style="font-size:0.6rem;">League</span></div>
    <div class="nav-item" onclick="window.location.href='/twfpl26-27/pages/fixtures.html'"><span style="font-size:1.3rem;">⚽</span><span style="font-size:0.6rem;">Fixtures</span></div>
    <div class="nav-item" onclick="window.location.href='/twfpl26-27/pages/scout.html'"><span style="font-size:1.3rem;">🔍</span><span style="font-size:0.6rem;">Scout</span></div>
  </div>
</body>
</html>

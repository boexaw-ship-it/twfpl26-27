<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1B4D2E" />
  <title>My Team — TW Fantasy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <script type="module">
    import { auth, db } from "/twfpl26-27/js/firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "/twfpl26-27/index.html"; return; }
      const snap = await getDoc(doc(db, "users", user.uid));
      if (!snap.exists() || snap.data().status !== "approved") { window.location.href = "/twfpl26-27/pages/pending.html"; return; }
      const fplId = snap.data().fplTeamId;
      document.getElementById("team-name").textContent = snap.data().teamName;
      onSnapshot(doc(db, "liveTeams", fplId), (d) => {
        if (d.exists()) renderTeam(d.data());
      });
    });

    function playerCard(p, isCaptain = false, isVice = false) {
      return `<div class="flex flex-col items-center" style="min-width:60px;">
        <div class="w-12 h-12 rounded-full flex items-center justify-center text-xl mb-1"
             style="background:#1F5C36;border:2px solid ${isCaptain ? '#F0D060' : isVice ? '#C0C0C0' : '#2A7A47'};">👕</div>
        <p class="text-white text-center font-medium" style="font-size:0.6rem;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name || "?"}</p>
        <div class="flex items-center gap-1 mt-0.5">
          <span style="font-size:0.65rem;color:#C9A84C;font-weight:700;">${p.livePoints || 0}</span>
          ${isCaptain ? '<span style="font-size:0.55rem;background:#F0D060;color:#0D2B1A;border-radius:9999px;padding:0 3px;font-weight:900;">C</span>' : ''}
          ${isVice ? '<span style="font-size:0.55rem;background:#C0C0C0;color:#0D2B1A;border-radius:9999px;padding:0 3px;font-weight:900;">V</span>' : ''}
        </div>
      </div>`;
    }

    function renderTeam(data) {
      const picks = data.picks || [];
      const starters = picks.filter(p => p.multiplier > 0);
      const subs = picks.filter(p => p.multiplier === 0);
      const gk = starters.filter(p => p.position === "GK");
      const def = starters.filter(p => p.position === "DEF");
      const mid = starters.filter(p => p.position === "MID");
      const fwd = starters.filter(p => p.position === "FWD");
      const totalPts = starters.reduce((s, p) => s + (p.livePoints || 0) * (p.multiplier || 1), 0);
      document.getElementById("gw-pts").textContent = totalPts;
      const render = (players) => `<div class="flex justify-center gap-3">${players.map(p => playerCard(p, p.isCaptain, p.isVice)).join("")}</div>`;
      document.getElementById("pitch").innerHTML = `
        <div class="space-y-3">
          ${render(gk)}
          <div style="border-top:1px solid rgba(201,168,76,0.2);margin:4px 0;"></div>
          ${render(def)}
          <div style="border-top:1px solid rgba(201,168,76,0.2);margin:4px 0;"></div>
          ${render(mid)}
          <div style="border-top:1px solid rgba(201,168,76,0.2);margin:4px 0;"></div>
          ${render(fwd)}
        </div>
        <div style="border-top:2px dashed rgba(201,168,76,0.3);margin:12px 0;"></div>
        <div class="flex justify-center gap-3">${subs.map(p => playerCard(p)).join("")}</div>`;
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: "Inter", sans-serif; background: #0D2B1A; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .gold-text { background: linear-gradient(135deg, #C9A84C, #F0D060, #A07830); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 12px; color:#3A9E5F; cursor:pointer; }
    .nav-item.active { color:#C9A84C; }
  </style>
</head>
<body>
  <div style="background:#0D2B1A;border-bottom:1px solid #1F5C36;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div class="flex items-center gap-2">
      <a href="/twfpl26-27/pages/dashboard.html" style="color:#3A9E5F;font-size:1.2rem;">←</a>
      <h1 class="gold-text font-bold" style="font-family:'Bebas Neue';letter-spacing:0.1em;font-size:1.3rem;">MY TEAM</h1>
    </div>
    <div class="text-right">
      <p id="team-name" class="text-xs font-semibold" style="color:#E8D5A3;"></p>
      <p class="text-xs" style="color:#3A9E5F;">GW Pts: <span id="gw-pts" style="color:#C9A84C;font-weight:700;">—</span></p>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;" class="px-4 py-4">
    <div id="pitch" style="background:linear-gradient(180deg,#1a5c30,#0f3d1e);border-radius:1rem;padding:16px;min-height:400px;border:1px solid rgba(201,168,76,0.2);">
      <p class="text-center text-xs py-8" style="color:#3A9E5F;">Team data loading...</p>
    </div>
  </div>
  <div style="background:#0D2B1A;border-top:1px solid #1F5C36;display:flex;justify-content:space-around;align-items:center;padding:4px 0;flex-shrink:0;">
    <div class="nav-item" onclick="window.location.href='/twfpl26-27/pages/dashboard.html'"><span style="font-size:1.3rem;">🏠</span><span style="font-size:0.6rem;">Home</span></div>
    <div class="nav-item" onclick="window.location.href='/twfpl26-27/pages/live.html'"><span style="font-size:1.3rem;">⚡</span><span style="font-size:0.6rem;">Live</span></div>
    <div class="nav-item" onclick="window.location.href='/twfpl26-27/pages/leagues.html'"><span style="font-size:1.3rem;">🏆</span><span style="font-size:0.6rem;">League</span></div>
    <div class="nav-item" onclick="window.location.href='/twfpl26-27/pages/tournament.html'"><span style="font-size:1.3rem;">⚽</span><span style="font-size:0.6rem;">Cup</span></div>
    <div class="nav-item" onclick="window.location.href='/twfpl26-27/pages/scout.html'"><span style="font-size:1.3rem;">🔍</span><span style="font-size:0.6rem;">Scout</span></div>
  </div>
</body>
</html>

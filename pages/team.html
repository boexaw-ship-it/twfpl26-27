<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1B4D2E" />
  <title>My Team — TW Fantasy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <style>
    * { -webkit-tap-highlight-color: transparent; }

    :root {
      --tw-green-900: #0F2E1C;
      --tw-green-800: #1B4D2E;
      --tw-green-600: #2F7A4F;
      --tw-gold: #C9A84C;
      --tw-text-dim: #7A8B82;
      --tw-border-green: rgba(27,77,46,0.35);
    }

    body {
      font-family: "Inter", sans-serif;
      background: #FFFFFF;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .gold-text { background: linear-gradient(135deg, #A98330, #C9A84C, #E8C878); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; padding:8px 12px; color:#B9C4BC; cursor:pointer; font-size: 0.6rem; font-weight: 600; }
    .nav-item.active { color: var(--tw-green-800); }
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

    /* Top bar — solid green */
    .top-bar {
      background: var(--tw-green-800);
    }

    /* Team name frame */
    .team-name-frame {
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 9999px;
      padding: 3px 12px;
      background: rgba(255,255,255,0.08);
    }

    /* Stat chips — thicker green border as requested */
    .stat-chip {
      background: #FFFFFF;
      border: 2px solid var(--tw-border-green);
      border-radius: 12px;
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 60px;
      flex-shrink: 0;
    }
    .stat-chip .stat-label {
      font-size: 0.55rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--tw-text-dim);
      margin-bottom: 2px;
    }
    .stat-chip .stat-value {
      font-size: 0.8rem;
      font-weight: 800;
    }

    /* 🔢 Player point badge */
    .player-point-circle {
      background-color: #000000;
      color: #ffffff;
      font-weight: 900;
      font-size: 0.85rem;
      min-width: 26px;
      height: 26px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      margin-top: 4px;
    }
  </style>

  <script type="module" src="../js/team.js"></script>
</head>
<body class="scrollbar-none">

  <div class="top-bar flex-shrink-0">
    <div class="px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <a href="../pages/dashboard.html" class="text-lg font-bold text-white">←</a>
        <h1 class="font-bold text-xl tracking-wider font-['Bebas_Neue'] text-white">MY TEAM</h1>
      </div>
      <span id="team-name" class="team-name-frame text-sm font-black tracking-wide text-white">——</span>
    </div>

    <!-- Stat strip: each stat is its own thicker-bordered green chip -->
    <div class="flex items-center gap-2 px-4 pb-3 overflow-x-auto scrollbar-none">
      <div class="stat-chip">
        <span class="stat-label">Hit</span>
        <span id="hit-label" class="stat-value" style="color:#DC2626;">-0</span>
      </div>
      <div class="stat-chip">
        <span class="stat-label">GW</span>
        <span id="gw-label" class="stat-value" style="color:var(--tw-green-800);">—</span>
      </div>
      <div class="stat-chip">
        <span class="stat-label">Pts</span>
        <span id="gw-pts" class="stat-value" style="color:#8A6D22;">—</span>
      </div>
      <div class="stat-chip">
        <span class="stat-label">Overall rank</span>
        <span id="overall-rank-box" class="stat-value" style="color:var(--tw-green-800);">——</span>
      </div>
      <div class="stat-chip">
        <span class="stat-label">Chip</span>
        <span id="chip-badge" class="stat-value" style="color:#8A6D22;font-size:0.65rem;">NO CHIP</span>
      </div>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto px-3 py-3 scrollbar-none space-y-3">

    <!-- Pitch: green lineup field -->
    <div class="relative bg-gradient-to-b from-[#1a5c30] via-[#144d24] to-[#0f3d1e] rounded-2xl p-4 border border-white/10 shadow-xl overflow-visible">

      <svg class="absolute inset-0 w-full h-full opacity-35 pointer-events-none" viewBox="0 0 200 420" preserveAspectRatio="none">
        <rect x="6" y="6" width="188" height="408" fill="none" stroke="white" stroke-width="1.3"/>
        <line x1="6" y1="210" x2="194" y2="210" stroke="white" stroke-width="1.3"/>
        <circle cx="100" cy="210" r="32" fill="none" stroke="white" stroke-width="1.3"/>
        <circle cx="100" cy="210" r="1.5" fill="white"/>
        <rect x="40" y="6" width="120" height="45" fill="none" stroke="white" stroke-width="1.3"/>
        <rect x="40" y="369" width="120" height="45" fill="none" stroke="white" stroke-width="1.3"/>
        <rect x="68" y="6" width="64" height="18" fill="none" stroke="white" stroke-width="1.3"/>
        <rect x="68" y="396" width="64" height="18" fill="none" stroke="white" stroke-width="1.3"/>
      </svg>

      <div class="relative z-10 h-full overflow-visible">
        <div id="pitch-rows" class="h-full overflow-visible">
          <p class="text-center text-xs py-24 text-white/50 font-medium tracking-wide">Team loading...</p>
        </div>
      </div>
    </div>

    <!-- Bench: same pitch-green background as the field above -->
    <div class="rounded-xl p-3 bg-gradient-to-b from-[#1a5c30] via-[#144d24] to-[#0f3d1e] border border-white/10 shadow-lg">
      <p class="text-[10px] font-black tracking-widest uppercase text-center mb-2.5" style="color:#C9A84C;">Bench</p>
      <div id="bench-row" class="flex justify-center items-center gap-x-2 flex-wrap"></div>
    </div>
  </div>

  <div class="bg-white border-t flex justify-around items-center py-1 flex-shrink-0 z-20" style="border-color:#E7ECE7;">
    <div class="nav-item" onclick="window.location.href='../pages/dashboard.html'"><span class="text-lg">🏠</span><span>Home</span></div>
    <div class="nav-item" onclick="window.location.href='../pages/live.html'"><span class="text-lg">⚡</span><span>Live</span></div>
    <div class="nav-item active" onclick="window.location.href='../pages/leagues.html'"><span class="text-lg">🏆</span><span>League</span></div>
    <div class="nav-item" onclick="window.location.href='../pages/fixtures.html'"><span class="text-lg">⚽</span><span>Fixtures</span></div>
    <div class="nav-item" onclick="window.location.href='../pages/scout.html'"><span class="text-lg">🔍</span><span>Scout</span></div>
  </div>
</body>
</html>

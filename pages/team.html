<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D2B1A" />
  <title>My Team — TW Fantasy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <style>
    * { 
      -webkit-tap-highlight-color: transparent; 
    }
    
    /* 💡 🎯 🚀 CRITICAL MOBILE SELECT BLOCK ENGINE */
    /* စာမျက်နှာတစ်ခုလုံးရှိ မည်သည့်စာသား၊ ဂျာစီနှင့် Point ကတ်ပြားကိုမဆို ဖိမိပါက Google Translate / Search Bar များ လုံးဝမတက်စေရန် ပိတ်ဆို့ခြင်း */
    body { 
      font-family: "Inter", sans-serif; 
      background: #0D2B1A; 
      height: 100vh; 
      overflow: hidden; 
      display: flex; 
      flex-direction: column; 
      -webkit-user-select: none;  /* iOS & Android Chrome select ပိတ်ဆို့ခြင်း */
      -moz-user-select: none;     /* Firefox browser selection ပိတ်ဆို့ခြင်း */
      -ms-user-select: none;      /* IE select ပိတ်ဆို့ခြင်း */
      user-select: none;          /* စာသားတစ်ခုလုံးအား ဖိနှိပ်မှုမှ ရာနှုန်းပြည့် ကာကွယ်ခြင်း */
    }
    
    .gold-text { background: linear-gradient(135deg, #C9A84C, #F0D060, #A07830); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 12px; color:#3A9E5F; cursor:pointer; font-size: 0.65rem; font-weight: 500; }
    .nav-item.active { color:#C9A84C; }
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

    /* 🔢 ကြီးမားထင်ရှားသော အမဲရောင် အမှတ်အဝိုင်း စနစ် */
    .player-point-circle {
      background-color: #000000;
      color: #ffffff;
      font-weight: 900;
      font-size: 0.85rem;   
      min-width: 26px;      
      height: 26px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      margin-top: 4px;
    }
  </style>

  <script type="module" src="../js/team.js"></script>
</head>
<body class="scrollbar-none">

  <div class="bg-[#0D2B1A] border-b border-[#1F5C36] px-4 py-3 flex items-center justify-between flex-shrink-0">
    <div class="flex items-center gap-2">
      <a href="../pages/dashboard.html" class="text-[#3A9E5F] text-lg font-bold">←</a>
      <h1 class="gold-text font-bold text-xl tracking-wider font-['Bebas_Neue']">MY TEAM</h1>
    </div>
    <span id="team-name" class="text-sm font-black tracking-wide text-[#E8D5A3]">——</span>
  </div>

  <div class="bg-[#1B4D2E] px-3 py-2.5 flex items-center justify-between flex-shrink-0 border-b border-gray-800 gap-x-1">
    <div class="flex items-center gap-2.5 sm:gap-4">
      <span id="hit-label" class="text-xs font-bold text-red-400">Hit: -0</span>
      <span class="text-gray-600">|</span>
      <span id="gw-label" class="text-xs font-bold text-white">GW —</span>
      <span class="text-gray-600">|</span>
      <span class="text-xs font-bold text-[#3A9E5F]">Pts: <span id="gw-pts" class="text-yellow-500 font-extrabold">—</span></span>
    </div>

    <div class="rounded-md px-2 py-0.5 flex items-center gap-1 border border-[#C9A84C]/30" style="background:rgba(201,168,76,0.1);">
      <span class="text-[9px] font-bold uppercase tracking-wider text-[#E8D5A3]">Rank:</span>
      <span id="overall-rank-box" class="text-xs font-black text-[#F0D060]">——</span>
    </div>

    <span id="chip-badge" class="text-[9px] font-black px-2 py-0.5 rounded bg-yellow-500/10 border border-yellow-500/30 text-yellow-500 tracking-wider uppercase">NO CHIP</span>
  </div>

  <div class="flex-1 overflow-y-auto px-3 py-3 scrollbar-none space-y-3">

    <div class="relative bg-gradient-to-b from-[#1a5c30] via-[#144d24] to-[#0f3d1e] rounded-2xl p-4 border border-white/10 shadow-2xl overflow-visible">
      
      <svg class="absolute inset-0 w-full h-full opacity-35 pointer-events-none" viewBox="0 0 200 420" preserveAspectRatio="none">
        <rect x="6" y="6" width="188" height="408" fill="none" stroke="white" stroke-width="1.3"/>
        <line x1="6" y1="210" x2="194" y2="210" stroke="white" stroke-width="1.3"/>
        <circle cx="100" cy="210" r="32" fill="none" stroke="white" stroke-width="1.3"/>
        <circle cx="100" cy="210" r="1.5" fill="white"/>
        <rect x="40" y="6" width="120" height="45" fill="none" stroke="white" stroke-width="1.3"/>
        <rect x="40" y="369" width="120" height="45" fill="none" stroke="white" stroke-width="1.3"/>
        <rect x="68" y="6" width="64" height="18" fill="none" stroke="white" stroke-width="1.3"/>
        <rect x="68" y="396" width="64" height="18" fill="none" stroke="white" stroke-width="1.3"/>
      </svg>

      <div class="relative z-10 h-full overflow-visible">
        <div id="pitch-rows" class="h-full overflow-visible">
          <p class="text-center text-xs py-24 text-white/50 font-medium tracking-wide">Team loading...</p>
        </div>
      </div>
    </div>

    <div class="rounded-xl p-3 bg-[#113a21] border border-[#1F5C36] shadow-lg">
      <p class="text-[10px] font-black text-[#C9A84C] tracking-widest uppercase text-center mb-2.5">Bench (အရန်လူစာရင်း)</p>
      <div id="bench-row" class="flex justify-center items-center gap-x-2 flex-wrap"></div>
    </div>
  </div>

  <div class="bg-[#0D2B1A] border-t border-[#1F5C36] flex justify-around items-center py-1 flex-shrink-0 z-20">
    <div class="nav-item" onclick="window.location.href='../pages/dashboard.html'"><span class="text-lg">🏠</span><span>Home</span></div>
    <div class="nav-item" onclick="window.location.href='../pages/live.html'"><span class="text-lg">⚡</span><span>Live</span></div>
    <div class="nav-item active" onclick="window.location.href='../pages/leagues.html'"><span class="text-lg">🏆</span><span>League</span></div>
    <div class="nav-item" onclick="window.location.href='../pages/fixtures.html'"><span class="text-lg">⚽</span><span>Fixtures</span></div>
    <div class="nav-item" onclick="window.location.href='../pages/scout.html'"><span class="text-lg">🔍</span><span>Scout</span></div>
  </div>
</body>
</html>
